name: UntitledDungeons
version: 0.1.0
main: com.untitledmc.dungeons.UntitledDungeonsPlugin
api-version: '1.21'
author: theme
description: Core dungeon plugin for Untitled Minecraft Server

commands:
  uds:
    description: Main UntitledDungeons command
    usage: /uds
    permission: untitleddungeons.use
  ditem:
    description: Custom item command
    usage: /ditem give <player> <item_id> [amount] or /ditem list
  dmob:
    description: Custom mob command
    usage: /dmob spawn <mob_id>
    permission: untitleddungeons.admin

permissions:
  untitleddungeons.use:
    description: Allows use of basic UntitledDungeons commands
    default: true
  untitleddungeons.admin:
    description: Allows UntitledDungeons admin testing commands
    default: op
